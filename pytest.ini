[pytest]
# Pytest configuration for AI Healthcare Chatbot

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    auth: Authentication tests
    api: API endpoint tests
    chat: Chat functionality tests
    admin: Admin panel tests

# Coverage options (if using pytest-cov)
# Uncomment these lines to enable coverage reporting
# [coverage:run]
# source = .
# omit = tests/*,venv/*,*/__pycache__/*

# [coverage:report]
# precision = 2
# show_missing = True
