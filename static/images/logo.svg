<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient1)" />
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Medical Cross with Heart -->
  <g transform="translate(100, 100)">
    <!-- Vertical bar of cross -->
    <rect x="-12" y="-50" width="24" height="100" rx="12" fill="#ffffff" />
    <!-- Horizontal bar of cross -->
    <rect x="-50" y="-12" width="100" height="24" rx="12" fill="#ffffff" />
    
    <!-- Heart shape in center -->
    <path d="M 0,-8 C -8,-8 -12,-4 -12,2 C -12,10 -4,16 0,20 C 4,16 12,10 12,2 C 12,-4 8,-8 0,-8 Z" 
          fill="#ef4444" stroke="#ffffff" stroke-width="2"/>
    
    <!-- AI Circuit pattern -->
    <circle cx="-30" cy="-30" r="4" fill="#14b8a6" />
    <circle cx="30" cy="-30" r="4" fill="#14b8a6" />
    <circle cx="-30" cy="30" r="4" fill="#14b8a6" />
    <circle cx="30" cy="30" r="4" fill="#14b8a6" />
    
    <!-- Connection lines -->
    <line x1="-30" y1="-30" x2="0" y2="0" stroke="#14b8a6" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="-30" x2="0" y2="0" stroke="#14b8a6" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="30" x2="0" y2="0" stroke="#14b8a6" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="30" x2="0" y2="0" stroke="#14b8a6" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Outer ring decoration -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
</svg>
