<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescriptions - AI Healthcare Chatbot</title>
    <link rel="stylesheet" href="/static/css/enhanced.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-heartbeat"></i>
                <span>HealthCare AI</span>
            </div>
            <div class="nav-menu">
                <a href="/dashboard" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/chat" class="nav-link">
                    <i class="fas fa-comments"></i>
                    <span>AI Chat</span>
                </a>
                <a href="/appointments" class="nav-link">
                    <i class="fas fa-calendar-check"></i>
                    <span>Appointments</span>
                </a>
                <a href="/prescriptions" class="nav-link active">
                    <i class="fas fa-prescription-bottle-alt"></i>
                    <span>Prescriptions</span>
                </a>
                <a href="/vital-signs" class="nav-link">
                    <i class="fas fa-heartbeat"></i>
                    <span>Vital Signs</span>
                </a>
                <a href="/lab-reports" class="nav-link">
                    <i class="fas fa-flask"></i>
                    <span>Lab Reports</span>
                </a>
            </div>
            <div class="nav-actions">
                <button class="icon-btn" id="notificationBtn">
                    <i class="fas fa-bell"></i>
                    <span class="badge badge-danger notification-badge">3</span>
                </button>
                <div class="user-menu">
                    <button class="user-btn" id="userMenuBtn">
                        <div class="user-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <span class="user-name" id="userName">Loading...</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="/profile" class="dropdown-item">
                            <i class="fas fa-user-circle"></i>
                            <span>Profile</span>
                        </a>
                        <a href="/settings" class="dropdown-item">
                            <i class="fas fa-cog"></i>
                            <span>Settings</span>
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Logout</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header animate-fade-in">
                <div>
                    <h1 class="page-title">My Prescriptions</h1>
                    <p class="page-subtitle">View and manage your medications</p>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-row animate-fade-in-up" style="animation-delay: 0.1s">
                <div class="stat-box">
                    <div class="stat-icon bg-success">
                        <i class="fas fa-pills"></i>
                    </div>
                    <div>
                        <div class="stat-number" id="activeCount">0</div>
                        <div class="stat-text">Active</div>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon bg-warning">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <div>
                        <div class="stat-number" id="refillCount">0</div>
                        <div class="stat-text">Need Refill</div>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon bg-info">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div>
                        <div class="stat-number" id="completedCount">0</div>
                        <div class="stat-text">Completed</div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-bar animate-fade-in-up" style="animation-delay: 0.2s">
                <div class="filter-group">
                    <input type="text" class="form-input" placeholder="Search prescriptions..." id="searchInput">
                </div>
                <div class="filter-group">
                    <select class="form-select" id="statusFilter">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>

            <!-- Prescriptions Grid -->
            <div class="prescriptions-grid-page" id="prescriptionsContainer">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <span>Loading prescriptions...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Prescription Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Prescription Details</h3>
                <button class="modal-close" onclick="closeModal('detailModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="prescriptionDetails">
                <!-- Details will be loaded here -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('detailModal')">Close</button>
                <button class="btn btn-primary" onclick="printPrescription()">
                    <i class="fas fa-print"></i> Print
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/static/js/enhanced.js"></script>
    <script>
        let prescriptions = [];

        // Initialize on load
        document.addEventListener('DOMContentLoaded', async function() {
            // Check authentication
            async function checkAuth() {
                try {
                    const result = await API.auth.checkAuth();
                    return result.authenticated;
                } catch (error) {
                    return false;
                }
            }

            const isAuth = await checkAuth();
            if (!isAuth) {
                window.location.href = '/login';
                return;
            }

            await loadUserProfile();
            await loadPrescriptions();
            initializeUIComponents();
        });

        // Load user profile
        async function loadUserProfile() {
            try {
                const profile = await API.profile.get();
                document.getElementById('userName').textContent = profile.full_name || 'User';
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('userName').textContent = 'User';
            }
        }

        // Load prescriptions
        async function loadPrescriptions() {
            const container = document.getElementById('prescriptionsContainer');
            try {
                const result = await API.prescriptions.list();
                prescriptions = result.prescriptions || result || [];
                updateStats();
                displayPrescriptions(prescriptions);
            } catch (error) {
                console.error('Error loading prescriptions:', error);
                container.innerHTML = '<div class="error-state">Failed to load prescriptions</div>';
                showToast('Failed to load prescriptions', 'danger');
            }
        }

        // Update stats
        function updateStats() {
            const active = prescriptions.filter(p => p.status === 'active').length;
            const needRefill = prescriptions.filter(p => p.refills_remaining !== undefined && p.refills_remaining <= 1).length;
            const completed = prescriptions.filter(p => p.status === 'completed').length;

            document.getElementById('activeCount').textContent = active;
            document.getElementById('refillCount').textContent = needRefill;
            document.getElementById('completedCount').textContent = completed;
        }

        // Display prescriptions
        function displayPrescriptions(data) {
            const container = document.getElementById('prescriptionsContainer');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state animate-fade-in">
                        <i class="fas fa-prescription-bottle-alt"></i>
                        <h3>No prescriptions found</h3>
                        <p>Your prescriptions will appear here</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.map((rx, index) => {
                const statusClass = rx.status === 'active' ? 'success' : rx.status === 'completed' ? 'info' : 'secondary';
                const needsRefill = rx.refills_remaining !== undefined && rx.refills_remaining <= 1;

                return `
                    <div class="prescription-card-large animate-scale-in" style="animation-delay: ${index * 0.05}s" onclick="showPrescriptionDetail(${rx.id})">
                        <div class="prescription-header-large">
                            <div class="prescription-icon">
                                <i class="fas fa-pills"></i>
                            </div>
                            <div class="prescription-meta">
                                <span class="badge badge-${statusClass}">${rx.status}</span>
                                ${needsRefill ? '<span class="badge badge-warning"><i class="fas fa-exclamation-triangle"></i> Refill Soon</span>' : ''}
                            </div>
                        </div>
                        <div class="prescription-body-large">
                            <h3>${rx.medication_name}</h3>
                            <div class="prescription-info">
                                <div class="info-item">
                                    <i class="fas fa-capsules"></i>
                                    <span><strong>Dosage:</strong> ${rx.dosage}</span>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-clock"></i>
                                    <span><strong>Frequency:</strong> ${rx.frequency}</span>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-calendar"></i>
                                    <span><strong>Duration:</strong> ${rx.duration || 'As prescribed'}</span>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-user-md"></i>
                                    <span><strong>Doctor:</strong> ${rx.doctor_name || 'Unknown'}</span>
                                </div>
                            </div>
                            ${rx.instructions ? `
                                <div class="prescription-instructions">
                                    <i class="fas fa-info-circle"></i>
                                    <span>${rx.instructions}</span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="prescription-footer-large">
                            <small class="text-muted">Prescribed on ${new Date(rx.prescribed_date || Date.now()).toLocaleDateString()}</small>
                            <button class="btn btn-sm btn-text" onclick="event.stopPropagation(); showPrescriptionDetail(${rx.id})">
                                View Details <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Show prescription detail
        function showPrescriptionDetail(id) {
            const rx = prescriptions.find(p => p.id === id);
            if (!rx) return;

            const detailsHtml = `
                <div class="prescription-detail">
                    <div class="detail-section">
                        <h4><i class="fas fa-pills"></i> Medication Information</h4>
                        <table class="detail-table">
                            <tr>
                                <td><strong>Medication Name:</strong></td>
                                <td>${rx.medication_name}</td>
                            </tr>
                            <tr>
                                <td><strong>Dosage:</strong></td>
                                <td>${rx.dosage}</td>
                            </tr>
                            <tr>
                                <td><strong>Frequency:</strong></td>
                                <td>${rx.frequency}</td>
                            </tr>
                            <tr>
                                <td><strong>Duration:</strong></td>
                                <td>${rx.duration || 'As prescribed'}</td>
                            </tr>
                            <tr>
                                <td><strong>Status:</strong></td>
                                <td><span class="badge badge-${rx.status === 'active' ? 'success' : 'secondary'}">${rx.status}</span></td>
                            </tr>
                        </table>
                    </div>
                    
                    ${rx.instructions ? `
                        <div class="detail-section">
                            <h4><i class="fas fa-info-circle"></i> Instructions</h4>
                            <p>${rx.instructions}</p>
                        </div>
                    ` : ''}
                    
                    <div class="detail-section">
                        <h4><i class="fas fa-user-md"></i> Prescriber Information</h4>
                        <table class="detail-table">
                            <tr>
                                <td><strong>Doctor:</strong></td>
                                <td>${rx.doctor_name || 'Unknown'}</td>
                            </tr>
                            <tr>
                                <td><strong>Prescribed Date:</strong></td>
                                <td>${new Date(rx.prescribed_date || Date.now()).toLocaleDateString()}</td>
                            </tr>
                        </table>
                    </div>
                    
                    ${rx.refills_remaining !== undefined ? `
                        <div class="detail-section">
                            <h4><i class="fas fa-redo"></i> Refill Information</h4>
                            <p><strong>Refills Remaining:</strong> ${rx.refills_remaining}</p>
                            ${rx.refills_remaining <= 1 ? '<p class="text-warning"><i class="fas fa-exclamation-triangle"></i> Contact your doctor for refills</p>' : ''}
                        </div>
                    ` : ''}
                </div>
            `;

            document.getElementById('prescriptionDetails').innerHTML = detailsHtml;
            openModal('detailModal');
        }

        // Print prescription
        function printPrescription() {
            window.print();
        }

        // Filter prescriptions
        function filterPrescriptions() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            let filtered = prescriptions.filter(rx => {
                const matchesSearch = rx.medication_name?.toLowerCase().includes(search) || 
                                    rx.doctor_name?.toLowerCase().includes(search);
                const matchesStatus = !status || rx.status === status;

                return matchesSearch && matchesStatus;
            });

            displayPrescriptions(filtered);
        }

        // Initialize UI components
        function initializeUIComponents() {
            // User menu
            const userMenuBtn = document.getElementById('userMenuBtn');
            const userDropdown = document.getElementById('userDropdown');
            userMenuBtn.addEventListener('click', () => {
                userDropdown.classList.toggle('show');
            });

            document.addEventListener('click', (e) => {
                if (!userMenuBtn.contains(e.target)) {
                    userDropdown.classList.remove('show');
                }
            });

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', async (e) => {
                e.preventDefault();
                try {
                    await API.auth.logout();
                    showToast('Logged out successfully', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1000);
                } catch (error) {
                    console.error('Logout error:', error);
                    window.location.href = '/login';
                }
            });

            // Search and filters
            document.getElementById('searchInput').addEventListener('input', filterPrescriptions);
            document.getElementById('statusFilter').addEventListener('change', filterPrescriptions);
        }

        // Modal functions
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('show');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }
    </script>
</body>
</html>
